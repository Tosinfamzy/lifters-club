version: "3.8"

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: lifters-test-db
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: lifters_test
    ports:
      - "5433:5432"  # Use 5433 to avoid conflicts with local Postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d lifters_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data  # Use tmpfs for faster tests (data is ephemeral)
